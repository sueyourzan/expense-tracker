spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/expense_tracker?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false